spack:
  specs:
  - apptainer+suid
  view: true
  concretizer:
    unify: true
  packages:
    all:
      target: [x86_64]
    gcc:
      externals:
      - spec: gcc@11.5.0 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc
            cxx: /usr/bin/g++
            fortran: /usr/bin/gfortran